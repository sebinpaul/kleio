name: Backend tests

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BE

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: BE/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run core.tests
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key
          DEBUG: "True"
        run: python manage.py test core.tests --verbosity=2
